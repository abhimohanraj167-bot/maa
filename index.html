<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Maa ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #ffc1cc);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* Center box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Button */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4d6d;
  font-size: 16px;
  cursor: pointer;
  margin: 10px;
}

/* Hidden sections */
.hidden {
  display: none;
}

/* Slide animation */
.slide {
  animation: slideUp 1.5s ease;
}

@keyframes slideUp {
  from {transform: translate(-50%, 100%);}
  to {transform: translate(-50%, -50%);}
}
</style>

</head>
<body>

<!-- Step 1 -->
<div id="step1" class="box">
  <h2>Do you want to open? 💖</h2>
  <button onclick="openPage()">Yes</button>
  <button onclick="alert('Please click Yes ❤️')">No</button>
</div>

<!-- Step 2 -->
<div id="step2" class="box hidden">
  <h1 class="slide">Hello Mom ❤️</h1>
  <button onclick="nextStep()">Click Here 💌</button>
</div>

<!-- Step 3 -->
<div id="step3" class="box hidden">
  <h1>Anjana Kumari ❤️</h1>

  <p style="font-size:20px;">
    Maa, aap meri duniya ho 💖<br>
    Aapke bina sab kuch adhoora hai.<br>
    Aapka pyaar meri sabse badi taqat hai ❤️
  </p>

  <p style="margin-top:20px;">
    💕 "Maa wo hoti hai jo bina kahe sab samajh jaati hai."<br><br>
    💕 "Duniya mein sab kuch mil sakta hai, par Maa jaisa pyaar nahi."
  </p>
</div>

<script>
function openPage() {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").classList.remove("hidden");
}

function nextStep() {
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").classList.remove("hidden");
}
</script>

</body>
</html>
